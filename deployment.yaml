apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
type: Opaque
data:
  username: QUtJQVU2R0RaVklIRjVZNVA2NlU=
  password: M0xsRnV1ZTFWOGtHL3lVS2RoSWZ5UHpkd0pHYzdGblVuczBBbC9tKw==
--- 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hprofile
spec:
  selector:
    matchLabels:
      app: hprofile
  replicas: 2
  template:
    metadata:
      labels:
        app: hprofile
    spec:
      containers:
      - name: hprofile
        image: 339713042958.dkr.ecr.us-east-1.amazonaws.com/actapp:14
      imagePullSecrets:
      - name: ecr-registry-secret
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hprofile-service
spec:
  selector:
    app: hprofile
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort