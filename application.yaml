apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hprofile-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/arif2997/hprofile.git
    targetRevision: HEAD
    path: ./
  destination: 
    server: https://kubernetes.default.svc
    namespace: hprofile

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true